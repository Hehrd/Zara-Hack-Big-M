spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:Backend/.env[.properties]

  application:
    name: zara-hack-preparation

  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:6969}

app:
  auth:
    issuer: ${APP_AUTH_ISSUER:zara-hack-preparation}
    secret: ${APP_AUTH_SECRET}
    access-token-ttl: ${APP_AUTH_ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${APP_AUTH_REFRESH_TOKEN_TTL:P30D}
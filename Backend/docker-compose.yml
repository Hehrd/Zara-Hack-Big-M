services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zara-hack-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT:-6969}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      SUPABASE_DB_USER: ${SUPABASE_DB_USER}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      APP_AUTH_SECRET: ${APP_AUTH_SECRET}
      APP_AUTH_ISSUER: ${APP_AUTH_ISSUER:-zara-hack-preparation}
      APP_AUTH_ACCESS_TOKEN_TTL: ${APP_AUTH_ACCESS_TOKEN_TTL:-PT15M}
      APP_AUTH_REFRESH_TOKEN_TTL: ${APP_AUTH_REFRESH_TOKEN_TTL:-P30D}
    ports:
      - "${SERVER_PORT:-6969}:${SERVER_PORT:-6969}"
